services:
  postgres:
    image: postgres:16
    container_name: mementoweb-postgres
    environment:
      POSTGRES_DB: mementoweb
      POSTGRES_USER: mementoweb
      POSTGRES_PASSWORD: mementoweb
    ports:
      - "5433:5432"
    volumes:
      - mementoweb-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mementoweb -d mementoweb"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  mementoweb-postgres-data: